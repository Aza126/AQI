name: Air Quality Inference
on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch:

jobs:
  inference-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.3'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-actions.txt

      - name: Download Models & Scaler
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          DRIVE_ID_SCALER: ${{ secrets.DRIVE_ID_SCALER }}
          DRIVE_ID_TRAINING_DATA: ${{ secrets.DRIVE_ID_TRAINING_DATA }}
          DRIVE_ID_RF: ${{ secrets.DRIVE_ID_RF }}
          DRIVE_ID_LSTM: ${{ secrets.DRIVE_ID_LSTM }}
        run: python -m src.scripts.download_models

      - name: Preprocess Data
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python -m src.preprocess

      - name: Run Inference
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python -m src.inference

      - name: Notify Status
        if: always()
        run: echo "Inference pipeline finished with status ${{ job.status }}"

app:
  name: "AQI Dashboard"

locations:
  - name: "Ha Noi"
    lat: 21.0285
    lon: 105.8542
  - name: "Ho Chi Minh"
    lat: 10.8231
    lon: 106.6297
  - name: "Hue"
    lat: 16.4637
    lon: 107.5909
  - name: "Da Nang"
    lat: 16.0678
    lon: 108.2208
  - name: "Nha Trang"
    lat: 12.2388
    lon: 109.1967
  - name: "Ha Long"
    lat: 20.9505
    lon: 107.0733

api:
  base_url: "https://air-quality-api.open-meteo.com/v1/air-quality"
  weather_url: "https://api.open-meteo.com/v1/forecast"

mongo:
  db_name: "H_test_db"
  raw_collection: "db_raw"
  processed_collection: "db_processed"
  prediction_collection: "db_predictions"

model:
  rf:
    path: "models/rf/rf_v1.pkl"
    version: "v1"
  lstm:
    path: "models/lstm/lstm_v1.keras"
    version: "v1"

artifacts:
  scaler_path: "artifacts/scaler.pkl"
  training_data_path: "artifacts/training_data_scaled.parquet"

inference:
  run_models:
    - rf
    - lstm